<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 内容净化 - 快速验证</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>AI 内容净化（检测 → 人类化）</h1>

  <form id="uploadForm">
    <label for="fileInput">上传稿件（txt / md）:</label>
    <input type="file" id="fileInput" accept=".txt,.md" required />
    <button type="submit">开始处理</button>
  </form>

  <section id="resultSection" style="display:none;">
    <h2>处理结果</h2>
    <p><strong>原稿 AI 检测率：</strong> <span id="origScore"></span></p>
    <p><strong>重塑后 AI 检测率：</strong> <span id="refinedScore"></span></p>

    <details open>
      <summary>原稿预览</summary>
      <pre id="origText"></pre>
    </details>

    <details open>
      <summary>人类化稿件</summary>
      <pre id="refinedText"></pre>
    </details>

    <a id="downloadLink" href="#" download="refined.md">下载人类化稿件</a>
  </section>

  <script src="app.js"></script>
</body>
</html>
