version: "3.9"

services:
  api:
    build: .
    container_name: ai_content_cleaner
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY}
    volumes:
      - ./data:/app/data          # 持久化 SQLite